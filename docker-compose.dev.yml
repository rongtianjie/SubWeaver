services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: whisper_platform
      POSTGRES_USER: whisper
      POSTGRES_PASSWORD: ${DB_PASSWORD:-whisper_secret}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whisper -d whisper_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
