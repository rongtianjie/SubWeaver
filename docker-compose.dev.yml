services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: subweaver
      POSTGRES_USER: subweaver
      POSTGRES_PASSWORD: ${DB_PASSWORD:-subweaver_secret}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subweaver -d subweaver"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
